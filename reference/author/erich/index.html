lle Kategorisierung hinterlegt.[/su_spoiler]   [su_spoiler title=\"App\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Die komfortable, offlinef\u00e4hige NOVA-App f\u00fcr Apple und Windows. Sie erlaubt unter anderem das Melden, Annehmen und Ausl\u00f6sen von Auftr\u00e4gen sowie den Upload von Fotos und das Scannen von Barcodes und QR-Codes.[/su_spoiler]   [su_spoiler title=\" Arbeitsplatzmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Arbeitsplatzmanagement ordnet jeden Arbeitsplatz und das fixe Inventar einem Raum zu und zeigt auf Knopfdruck die Auslastung. Die Arbeitspl\u00e4tze und Objekte k\u00f6nnen Sie mit Hilfe einer CAD-Schnittstelle visualisieren.[/su_spoiler]   [su_spoiler title=\"Arbeitssicherheit\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul gibt Auskunft \u00fcber Arbeitsmittel, \u00fcber deren Gef\u00e4hrlichkeit und \u00fcber Schutzmassnahmen. Wiederkehrende Pr\u00fcfungen lassen sich planen, \u00fcberwachen und dokumentieren.[/su_spoiler]   [su_spoiler title=\"Auftrags- und Instandsetzungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem Modul k\u00f6nnen Sie  interne und externe Instandsetzungsauftr\u00e4ge ausl\u00f6sen und dokumentieren. Pro hinterlegtes Objekt sind die Aufw\u00e4nde und die detaillierte, transparente Auftragshistorie ersichtlich.[/su_spoiler]   [su_spoiler title=\"Baumkataster\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie den Baumbestand mit allen relevanten Stammdaten. Regelkontrollen k\u00f6nnen Sie mit Vorlaufzeit planen. In Verbindung mit dem Modul \u00abCAD-Viewer\u00bb visualisieren Sie die B\u00e4ume im Aussenplan.[/su_spoiler]   [su_spoiler title=\"Berichtsdesigner\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erstellen Sie aus aktuellen Daten professionelle Berichte mit Tabellen und Grafiken \u2013 schnell, einfach, automatisch. Die Berichte k\u00f6nnen Sie in zahlreiche Formate exportieren oder per E-Mail verschicken. [/su_spoiler]   [su_spoiler title=\"Budgetierung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem leistungsstarken Instrument erstellen Sie so viele Budgets, wie Sie ben\u00f6tigen. Und Sie analysieren jederzeit die aktuelle Kostensituation auf Basis Ihrer Bewertungskriterien.[/su_spoiler]   [su_spoiler title=\"CAD-Viewer und -Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul bildet eine bidirektionale Schnittstelle zwischen Datenbank und Zeichnungen. Auch Inventardaten lassen sich verkn\u00fcpfen. Fl\u00e4chen k\u00f6nnen Sie einf\u00e4rben, etwa nach Kostenstellen, Bodenbel\u00e4gen oder Nutzungsart.[/su_spoiler]   [su_spoiler title=\"Dashboard\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Reporting-Tool pr\u00e4sentiert zusammenfassend verschiedenste Berichte und Diagramme, etwa \u00fcber kritische Prozesse, Projekte und Tagesdaten. Das Dashboard ist im Browser, vom Tablet oder vom Smartphone bedienbar.[/su_spoiler]   [su_spoiler title=\"Datenfeld-Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Legen Sie in Ihrer Datenbank eigene Felder an \u2013 vom einfachen Feld bis zum Datums- und Referenzfeld. Die Felder k\u00f6nnen Sie mit dem Masken-Designer in der gew\u00fcnschten Maske platzieren.[/su_spoiler]   [su_spoiler title=\" Dokumentenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Finden statt suchen: Mit diesem Modul legen Sie Dokumente jeder Art strukturiert ab, ordnen die Dokumente per Drag & Drop einem Objekt zu und versehen sie mit Suchbegriffen. Bei Bedarf haben Sie stets die aktuelle Version zur Hand.[/su_spoiler]   [su_spoiler title=\" Energiemanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Zum \u00dcberblicken Ihrer Energiedaten. Hier k\u00f6nnen Sie zum Beispiel die Z\u00e4hlerstruktur und die Ablesewerte dokumentieren, virtuelle Z\u00e4hler abbilden, oder Ablesewerte in kWh-Heizwerte umrechnen.[/su_spoiler]   [su_spoiler title=\"Einweisungen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Ein Modul f\u00fcr Kliniken \u2013 es orientiert schnell und rechtssicher dar\u00fcber, wer in der Bedienung welcher Ger\u00e4te wann instruiert worden ist. Das Modul ist webbasiert und kann somit \u00fcberall auf den Stationen abgerufen werden.[/su_spoiler]   [su_spoiler title=\"Fl\u00e4chenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie \u00fcbersichtlich Objekte wie Geb\u00e4ude, Ebenen oder R\u00e4ume. Alle Objekte sind in einer Baumstruktur dargestellt \u2013 bei Bedarf zusammen mit Objekten aus den Modulen Ger\u00e4temanagement oder Schl\u00fcsselmanagement.[/su_spoiler]   [su_spoiler title=\"Fuhrparkverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Verwaltungsmodul f\u00fcr alle Fahrzeugtypen. Zu jedem Fahrzeug hinterlegen Sie relevante Stammdaten, Termine und Dokumente. Fahrzeuge lassen sich entweder Personen oder einem Pool zuordnen.[/su_spoiler]   [su_spoiler title=\"Gefahrstoffmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem Modul f\u00fchren Sie eine zentrale Dokumentation aller Arbeitsstoffe und Gefahrenstoffe und bestimmen deren Gefahrenpotenzial. Mit dem integrierten Berichtsdesigner erstellen Sie einen Gefahrstoffkataster.[/su_spoiler]   [su_spoiler title=\"Gew\u00e4hrleistungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul informiert Sie im Fall einer St\u00f6rung automatisch dar\u00fcber, ob f\u00fcr das betreffende Objekt noch Garantie besteht. Sie erfassen den Mangel, bewerten ihn und haben Zugriff auf den gesamten Schriftverkehr.[/su_spoiler]   [su_spoiler title=\"Instandhaltung / Pr\u00fcfen und Messen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt Sie beim rechtzeitigen, rechtskonformen Planen, Durchf\u00fchren und \u00dcberwachen von Ger\u00e4tepr\u00fcfungen, Inspektionen und Wartungen. Viele Pr\u00fcfsysteme sind schon eingebunden.[/su_spoiler]   [su_spoiler title=\"Inventarverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hierbei handelt es sich um einen einfachen, erweiterbaren Inventarverwaltungskatalog. M\u00f6glich ist die Zuordnung zu Objekten, das Hinterlegen weiterer Informationen wie Baujahr, Pr\u00fcfungstermine und Auftr\u00e4ge samt Kosten.[/su_spoiler]   [su_spoiler title=\"Kostenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie strukturiert interne und externe Kosten. Betr\u00e4ge erfassen Sie entweder manuell, mittels Importdatei oder via Schnittstelle zur Buchhaltung. Die Betr\u00e4ge lassen sich auf beliebig viele Objekte und Kostenstellen buchen.[/su_spoiler]   [su_spoiler title=\"Kundenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erm\u00f6glicht die Verwaltung von Daten zu Unternehmen oder Einzelpersonen. Sie k\u00f6nnen jeweils mehrere Adressen, Telefonnummern und E-Mail-Adressen hinterlegen und Informationen zur Kundenbeziehung erg\u00e4nzen.[/su_spoiler]   [su_spoiler title=\"Legenden-Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erstellen Sie eigene Legenden (Referenztabellen). In Kombination mit dem Datenfeld-Editor integrieren Sie neue Felder in die Legenden und positionieren alles mit dem Masken-Designer an die gew\u00fcnschte Stelle.[/su_spoiler]   [su_spoiler title=\"Masken-Designer\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit dem Masken-Designer passen Sie alle Oberfl\u00e4chen dem Bedarf von unterschiedlichsten Benutzergruppen an. S\u00e4mtliche Felder k\u00f6nnen ein- und ausgeblendet sowie frei positioniert und konfiguriert werden.[/su_spoiler]   [su_spoiler title=\"Materialwirtschaft / Lagerverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hier bestimmen Sie Lagerorte, bauen einen lagerunabh\u00e4ngigen Artikelstamm auf und ordnen die Artikel mit dem \u00abService Management\u00bb Auftr\u00e4gen zu. Mit praktischen Erweiterungen f\u00fcr eine effiziente Materialwirtschaft.[/su_spoiler]   [su_spoiler title=\"Medienkreisverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt den sicheren Betrieb von Medienkreisen wie zum Beispiel Stromkreise, WLAN, VLAN, IT-Netze, Druckgasanlagen oder Wasseranlagen, insbesondere, wenn Medizinprodukte angeschlossen sind.[/su_spoiler]   [su_spoiler title=\"Mietmanagement inklusive Nebenkosten\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Versehen Sie jede Einheit mit beliebig vielen Raum- und Fl\u00e4chendaten. Nutzen Sie konfigurierbare Umlageschl\u00fcssel f\u00fcr flexible Nebenkostenabrechnungen. Ein CAD-Viewer ist schon integriert. Besonders n\u00fctzlich mit dem Modul \u00abVertragsmanagement\u00bb.[/su_spoiler]   [su_spoiler title=\"Mobiles Arbeiten, Web-L\u00f6sungen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Modul \u00fcbermittelt die gew\u00fcnschten Daten ortsunabh\u00e4ngig auf alle Endger\u00e4te. Bei Bedarf k\u00f6nnen Sie ohne Verbindung arbeiten. Sobald Ihr Ger\u00e4t  wieder verbunden ist, werden die Daten automatisch synchronisiert. [/su_spoiler]   [su_spoiler title=\"Organisationsverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]In diesem Element sind alle Organisationseinheiten, Kostenstellen und Kontenrahmen \u00fcbersichtlich und individuell gestaltbar abgebildet. Bei Bedarf lassen sich vordefinierte Kontenrahmen hinterlegen.[/su_spoiler]   [su_spoiler title=\"Parkraummanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt Sie beim Verwalten des Parkraums. Sie k\u00f6nnen Stellpl\u00e4tze einer Person oder mehreren Personen zuordnen, Parkkarten ausgeben und Fahrzeugberechtigungen erteilen.[/su_spoiler]   [su_spoiler title=\"Projektmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Modul f\u00fcr jede Projektart \u2013 vom Bauprojekt bis zur j\u00e4hrlichen Investitionsplanung. Die ganze Historie wird \u00fcbersichtlich angezeigt. Sie haben jederzeit die Kontrolle \u00fcber Kosten, Termine und Projektstand.[/su_spoiler]   [su_spoiler title=\"Raumbuch\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Raumbuch verwaltet alle Daten zu einem Raum, etwa Kosten, Masse, Ausstattung und Termine. Das Raumbuch ist idealerweise kombiniert mit den Modulen Fl\u00e4chenmanagement und Reinigungsmanagement.[/su_spoiler]   [su_spoiler title=\"Real Estate Management\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul erf\u00fcllt alle Anforderungen an eine informatikgest\u00fctzte technische und kaufm\u00e4nnische Liegenschaftsverwaltung. Mit den dazugeh\u00f6rigen Modulen bildet es den Kern des Facility-Managements.[/su_spoiler]   [su_spoiler title=\"Rechnungsstellung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erm\u00f6glicht die komfortable Rechnungsstellung mit und ohne Bezug zu internen und externen Kosten. Auf Basis von Rechnungsvorlagen und Textbausteinen k\u00f6nnen Sie ebenfalls Zahlungsziele hinterlegen.[/su_spoiler]   [su_spoiler title=\"Reinigungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Damit fixieren und \u00fcberwachen Sie die Intervalle von Reinigungen aller Art. Sie verkn\u00fcpfen die Reinigungsreviere mit Dienstleistungsvertr\u00e4gen und haben bei Bedarf schnell alle Fl\u00e4chendaten zur Hand.[/su_spoiler]   [su_spoiler title=\"Ressourcenplanung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Eine grafische Kalenderoberfl\u00e4che unterst\u00fctzt Sie beim Einsatz von internem und externem Personal. Dazu geh\u00f6rt zum Beispiel eine \u00dcbersicht der Soll- und Ist-Zeiten. Zudem k\u00f6nnen Sie Ger\u00e4te und R\u00e4ume disponieren.[/su_spoiler]   [su_spoiler title=\"Risikomanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Immer h\u00e4ufiger sind Medizinger\u00e4te in Netzwerke eingebunden \u2013 mit entsprechenden Risiken. Mit diesem Modul k\u00f6nnen Sie Risiken ermitteln, bewerten und Massnahmen zur Risikominderung treffen.[/su_spoiler]   [su_spoiler title=\"Service-Center / Webportal\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Die Online-Anlaufstelle f\u00fcr alle FM-bezogenen Personalanliegen. Beispiele: St\u00f6rungen melden, R\u00e4ume reservieren oder Besucher anmelden. Die sehr nutzfreundliche Oberfl\u00e4che integriert sich nahtlos ins Intranet.[/su_spoiler]   [su_spoiler title=\"Service-Management\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hier verwalten Sie nach ITIL-Standard die Meldungen aus dem Service-Center sowie externe Meldungen. Zudem k\u00f6nnen Sie zum Beispiel auch Sammelauftr\u00e4ge f\u00fcr Pr\u00fcfungen sehr komfortabel erstellen.[/su_spoiler]   [su_spoiler title=\"Schl\u00fcsselverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]F\u00fcr die professionelle Verwaltung der Schliessanlagen, zum Beispiel der Schl\u00fcssel, Schliesszylinder und Chipkarten. Die Anlagen werden in Form von Schliesspl\u00e4nen und einer CAD-Visualisierung grafisch dargestellt.[/su_spoiler]   [su_spoiler title=\"Umzugsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Damit vergessen Sie keinen Aspekt eines Umzuges mehr. Sie k\u00f6nnen verschiedene Umzugsszenarien entwerfen, durchspielen und in der CAD-Zeichnung darstellen. \u00c4nderungen sind direkt im CAD-Plan m\u00f6glich.[/su_spoiler]   [su_spoiler title=\"Vertragsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]In diesem Modul k\u00f6nnen Sie jede Art von Vertr\u00e4gen mit Objekten verkn\u00fcpfen. Sie verwalten K\u00fcndigungsfristen, Laufzeiten oder Kosten und haben dank der automatischen Terminvorlage alle Fristen und Termine im Griff.[/su_spoiler]   [su_spoiler title=\" Workflow-Manager\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Modellieren Sie Ihre Gesch\u00e4ftsprozesse ereignis- oder zeitgesteuert. Die grafisch dargestellten Abl\u00e4ufe k\u00f6nnen Sie mit Programmfunktionen verkn\u00fcpfen und zahlreiche weitere Anforderungen umsetzen.[/su_spoiler] [/su_accordion]","shortcodeid":1666006705808,"info":{"type":"post","layouttype":"desktop","id":500}},{"cont":"[su_accordion class=\"\"]   [su_spoiler title=\"Abfallstoffmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul klassifiziert und dokumentiert die Abfallstoffe f\u00fcr ihre Lagerung und f\u00fcr den sp\u00e4teren Transport. Zudem unterst\u00fctzt Sie das Modul beim Erstellen von Entsorgungs- und Sammelnachweisen.[/su_spoiler]   [su_spoiler title=\"Anlagen- und Ger\u00e4temanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]F\u00fcr die \u00fcbersichtliche Verwaltung und Klassifizierung der Anlagen und Ger\u00e4te inklusive deren Ausstattung, also beispielsweise Zubeh\u00f6r, installierte Software, zus\u00e4tzliche Bauteile oder Netzwerkparameter bei IT-Ger\u00e4ten.[/su_spoiler]   [su_spoiler title=\"Anlagen- und Ger\u00e4temanagement Medizintechnik\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul ber\u00fccksichtigt die speziellen Anforderungen an die Verwaltung von medizintechnischen Ger\u00e4ten. Im Modul werden zum Beispiel Pr\u00fcftermine, Wartung, Sicherheitsmeldungen oder die offizielle Kategorisierung hinterlegt.[/su_spoiler]   [su_spoiler title=\"App\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Die komfortable, offlinef\u00e4hige NOVA-App f\u00fcr Apple und Windows. Sie erlaubt unter anderem das Melden, Annehmen und Ausl\u00f6sen von Auftr\u00e4gen sowie den Upload von Fotos und das Scannen von Barcodes und QR-Codes.[/su_spoiler]   [su_spoiler title=\" Arbeitsplatzmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Arbeitsplatzmanagement ordnet jeden Arbeitsplatz und das fixe Inventar einem Raum zu und zeigt auf Knopfdruck die Auslastung. Die Arbeitspl\u00e4tze und Objekte k\u00f6nnen Sie mit Hilfe einer CAD-Schnittstelle visualisieren.[/su_spoiler]   [su_spoiler title=\"Arbeitssicherheit\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul gibt Auskunft \u00fcber Arbeitsmittel, \u00fcber deren Gef\u00e4hrlichkeit und \u00fcber Schutzmassnahmen. Wiederkehrende Pr\u00fcfungen lassen sich planen, \u00fcberwachen und dokumentieren.[/su_spoiler]   [su_spoiler title=\"Auftrags- und Instandsetzungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem Modul k\u00f6nnen Sie  interne und externe Instandsetzungsauftr\u00e4ge ausl\u00f6sen und dokumentieren. Pro hinterlegtes Objekt sind die Aufw\u00e4nde und die detaillierte, transparente Auftragshistorie ersichtlich.[/su_spoiler]   [su_spoiler title=\"Baumkataster\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie den Baumbestand mit allen relevanten Stammdaten. Regelkontrollen k\u00f6nnen Sie mit Vorlaufzeit planen. In Verbindung mit dem Modul \u00abCAD-Viewer\u00bb visualisieren Sie die B\u00e4ume im Aussenplan.[/su_spoiler]   [su_spoiler title=\"Berichtsdesigner\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erstellen Sie aus aktuellen Daten professionelle Berichte mit Tabellen und Grafiken \u2013 schnell, einfach, automatisch. Die Berichte k\u00f6nnen Sie in zahlreiche Formate exportieren oder per E-Mail verschicken. [/su_spoiler]   [su_spoiler title=\"Budgetierung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem leistungsstarken Instrument erstellen Sie so viele Budgets, wie Sie ben\u00f6tigen. Und Sie analysieren jederzeit die aktuelle Kostensituation auf Basis Ihrer Bewertungskriterien.[/su_spoiler]   [su_spoiler title=\"CAD-Viewer und -Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul bildet eine bidirektionale Schnittstelle zwischen Datenbank und Zeichnungen. Auch Inventardaten lassen sich verkn\u00fcpfen. Fl\u00e4chen k\u00f6nnen Sie einf\u00e4rben, etwa nach Kostenstellen, Bodenbel\u00e4gen oder Nutzungsart.[/su_spoiler]   [su_spoiler title=\"Dashboard\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Reporting-Tool pr\u00e4sentiert zusammenfassend verschiedenste Berichte und Diagramme, etwa \u00fcber kritische Prozesse, Projekte und Tagesdaten. Das Dashboard ist im Browser, vom Tablet oder vom Smartphone bedienbar.[/su_spoiler]   [su_spoiler title=\"Datenfeld-Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Legen Sie in Ihrer Datenbank eigene Felder an \u2013 vom einfachen Feld bis zum Datums- und Referenzfeld. Die Felder k\u00f6nnen Sie mit dem Masken-Designer in der gew\u00fcnschten Maske platzieren.[/su_spoiler]   [su_spoiler title=\" Dokumentenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Finden statt suchen: Mit diesem Modul legen Sie Dokumente jeder Art strukturiert ab, ordnen die Dokumente per Drag & Drop einem Objekt zu und versehen sie mit Suchbegriffen. Bei Bedarf haben Sie stets die aktuelle Version zur Hand.[/su_spoiler]   [su_spoiler title=\" Energiemanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Zum \u00dcberblicken Ihrer Energiedaten. Hier k\u00f6nnen Sie zum Beispiel die Z\u00e4hlerstruktur und die Ablesewerte dokumentieren, virtuelle Z\u00e4hler abbilden, oder Ablesewerte in kWh-Heizwerte umrechnen.[/su_spoiler]   [su_spoiler title=\"Einweisungen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Ein Modul f\u00fcr Kliniken \u2013 es orientiert schnell und rechtssicher dar\u00fcber, wer in der Bedienung welcher Ger\u00e4te wann instruiert worden ist. Das Modul ist webbasiert und kann somit \u00fcberall auf den Stationen abgerufen werden.[/su_spoiler]   [su_spoiler title=\"Fl\u00e4chenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie \u00fcbersichtlich Objekte wie Geb\u00e4ude, Ebenen oder R\u00e4ume. Alle Objekte sind in einer Baumstruktur dargestellt \u2013 bei Bedarf zusammen mit Objekten aus den Modulen Ger\u00e4temanagement oder Schl\u00fcsselmanagement.[/su_spoiler]   [su_spoiler title=\"Fuhrparkverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Verwaltungsmodul f\u00fcr alle Fahrzeugtypen. Zu jedem Fahrzeug hinterlegen Sie relevante Stammdaten, Termine und Dokumente. Fahrzeuge lassen sich entweder Personen oder einem Pool zuordnen.[/su_spoiler]   [su_spoiler title=\"Gefahrstoffmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit diesem Modul f\u00fchren Sie eine zentrale Dokumentation aller Arbeitsstoffe und Gefahrenstoffe und bestimmen deren Gefahrenpotenzial. Mit dem integrierten Berichtsdesigner erstellen Sie einen Gefahrstoffkataster.[/su_spoiler]   [su_spoiler title=\"Gew\u00e4hrleistungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul informiert Sie im Fall einer St\u00f6rung automatisch dar\u00fcber, ob f\u00fcr das betreffende Objekt noch Garantie besteht. Sie erfassen den Mangel, bewerten ihn und haben Zugriff auf den gesamten Schriftverkehr.[/su_spoiler]   [su_spoiler title=\"Instandhaltung / Pr\u00fcfen und Messen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt Sie beim rechtzeitigen, rechtskonformen Planen, Durchf\u00fchren und \u00dcberwachen von Ger\u00e4tepr\u00fcfungen, Inspektionen und Wartungen. Viele Pr\u00fcfsysteme sind schon eingebunden.[/su_spoiler]   [su_spoiler title=\"Inventarverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hierbei handelt es sich um einen einfachen, erweiterbaren Inventarverwaltungskatalog. M\u00f6glich ist die Zuordnung zu Objekten, das Hinterlegen weiterer Informationen wie Baujahr, Pr\u00fcfungstermine und Auftr\u00e4ge samt Kosten.[/su_spoiler]   [su_spoiler title=\"Kostenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Verwalten Sie strukturiert interne und externe Kosten. Betr\u00e4ge erfassen Sie entweder manuell, mittels Importdatei oder via Schnittstelle zur Buchhaltung. Die Betr\u00e4ge lassen sich auf beliebig viele Objekte und Kostenstellen buchen.[/su_spoiler]   [su_spoiler title=\"Kundenmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erm\u00f6glicht die Verwaltung von Daten zu Unternehmen oder Einzelpersonen. Sie k\u00f6nnen jeweils mehrere Adressen, Telefonnummern und E-Mail-Adressen hinterlegen und Informationen zur Kundenbeziehung erg\u00e4nzen.[/su_spoiler]   [su_spoiler title=\"Legenden-Editor\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erstellen Sie eigene Legenden (Referenztabellen). In Kombination mit dem Datenfeld-Editor integrieren Sie neue Felder in die Legenden und positionieren alles mit dem Masken-Designer an die gew\u00fcnschte Stelle.[/su_spoiler]   [su_spoiler title=\"Masken-Designer\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Mit dem Masken-Designer passen Sie alle Oberfl\u00e4chen dem Bedarf von unterschiedlichsten Benutzergruppen an. S\u00e4mtliche Felder k\u00f6nnen ein- und ausgeblendet sowie frei positioniert und konfiguriert werden.[/su_spoiler]   [su_spoiler title=\"Materialwirtschaft / Lagerverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hier bestimmen Sie Lagerorte, bauen einen lagerunabh\u00e4ngigen Artikelstamm auf und ordnen die Artikel mit dem \u00abService Management\u00bb Auftr\u00e4gen zu. Mit praktischen Erweiterungen f\u00fcr eine effiziente Materialwirtschaft.[/su_spoiler]   [su_spoiler title=\"Medienkreisverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt den sicheren Betrieb von Medienkreisen wie zum Beispiel Stromkreise, WLAN, VLAN, IT-Netze, Druckgasanlagen oder Wasseranlagen, insbesondere, wenn Medizinprodukte angeschlossen sind.[/su_spoiler]   [su_spoiler title=\"Mietmanagement inklusive Nebenkosten\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Versehen Sie jede Einheit mit beliebig vielen Raum- und Fl\u00e4chendaten. Nutzen Sie konfigurierbare Umlageschl\u00fcssel f\u00fcr flexible Nebenkostenabrechnungen. Ein CAD-Viewer ist schon integriert. Besonders n\u00fctzlich mit dem Modul \u00abVertragsmanagement\u00bb.[/su_spoiler]   [su_spoiler title=\"Mobiles Arbeiten, Web-L\u00f6sungen\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Modul \u00fcbermittelt die gew\u00fcnschten Daten ortsunabh\u00e4ngig auf alle Endger\u00e4te. Bei Bedarf k\u00f6nnen Sie ohne Verbindung arbeiten. Sobald Ihr Ger\u00e4t  wieder verbunden ist, werden die Daten automatisch synchronisiert. [/su_spoiler]   [su_spoiler title=\"Organisationsverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]In diesem Element sind alle Organisationseinheiten, Kostenstellen und Kontenrahmen \u00fcbersichtlich und individuell gestaltbar abgebildet. Bei Bedarf lassen sich vordefinierte Kontenrahmen hinterlegen.[/su_spoiler]   [su_spoiler title=\"Parkraummanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul unterst\u00fctzt Sie beim Verwalten des Parkraums. Sie k\u00f6nnen Stellpl\u00e4tze einer Person oder mehreren Personen zuordnen, Parkkarten ausgeben und Fahrzeugberechtigungen erteilen.[/su_spoiler]   [su_spoiler title=\"Projektmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Modul f\u00fcr jede Projektart \u2013 vom Bauprojekt bis zur j\u00e4hrlichen Investitionsplanung. Die ganze Historie wird \u00fcbersichtlich angezeigt. Sie haben jederzeit die Kontrolle \u00fcber Kosten, Termine und Projektstand.[/su_spoiler]   [su_spoiler title=\"Raumbuch\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Das Raumbuch verwaltet alle Daten zu einem Raum, etwa Kosten, Masse, Ausstattung und Termine. Das Raumbuch ist idealerweise kombiniert mit den Modulen Fl\u00e4chenmanagement und Reinigungsmanagement.[/su_spoiler]   [su_spoiler title=\"Real Estate Management\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Dieses Modul erf\u00fcllt alle Anforderungen an eine informatikgest\u00fctzte technische und kaufm\u00e4nnische Liegenschaftsverwaltung. Mit den dazugeh\u00f6rigen Modulen bildet es den Kern des Facility-Managements.[/su_spoiler]   [su_spoiler title=\"Rechnungsstellung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Erm\u00f6glicht die komfortable Rechnungsstellung mit und ohne Bezug zu internen und externen Kosten. Auf Basis von Rechnungsvorlagen und Textbausteinen k\u00f6nnen Sie ebenfalls Zahlungsziele hinterlegen.[/su_spoiler]   [su_spoiler title=\"Reinigungsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Damit fixieren und \u00fcberwachen Sie die Intervalle von Reinigungen aller Art. Sie verkn\u00fcpfen die Reinigungsreviere mit Dienstleistungsvertr\u00e4gen und haben bei Bedarf schnell alle Fl\u00e4chendaten zur Hand.[/su_spoiler]   [su_spoiler title=\"Ressourcenplanung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Eine grafische Kalenderoberfl\u00e4che unterst\u00fctzt Sie beim Einsatz von internem und externem Personal. Dazu geh\u00f6rt zum Beispiel eine \u00dcbersicht der Soll- und Ist-Zeiten. Zudem k\u00f6nnen Sie Ger\u00e4te und R\u00e4ume disponieren.[/su_spoiler]   [su_spoiler title=\"Risikomanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Immer h\u00e4ufiger sind Medizinger\u00e4te in Netzwerke eingebunden \u2013 mit entsprechenden Risiken. Mit diesem Modul k\u00f6nnen Sie Risiken ermitteln, bewerten und Massnahmen zur Risikominderung treffen.[/su_spoiler]   [su_spoiler title=\"Service-Center / Webportal\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Die Online-Anlaufstelle f\u00fcr alle FM-bezogenen Personalanliegen. Beispiele: St\u00f6rungen melden, R\u00e4ume reservieren oder Besucher anmelden. Die sehr nutzfreundliche Oberfl\u00e4che integriert sich nahtlos ins Intranet.[/su_spoiler]   [su_spoiler title=\"Service-Management\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Hier verwalten Sie nach ITIL-Standard die Meldungen aus dem Service-Center sowie externe Meldungen. Zudem k\u00f6nnen Sie zum Beispiel auch Sammelauftr\u00e4ge f\u00fcr Pr\u00fcfungen sehr komfortabel erstellen.[/su_spoiler]   [su_spoiler title=\"Schl\u00fcsselverwaltung\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]F\u00fcr die professionelle Verwaltung der Schliessanlagen, zum Beispiel der Schl\u00fcssel, Schliesszylinder und Chipkarten. Die Anlagen werden in Form von Schliesspl\u00e4nen und einer CAD-Visualisierung grafisch dargestellt.[/su_spoiler]   [su_spoiler title=\"Umzugsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]Damit vergessen Sie keinen Aspekt eines Umzuges mehr. Sie k\u00f6nnen verschiedene Umzugsszenarien entwerfen, durchspielen und in der CAD-Zeichnung darstellen. \u00c4nderungen sind direkt im CAD-Plan m\u00f6glich.[/su_spoiler]   [su_spoiler title=\"Vertragsmanagement\" open=\"no\" style=\"default\" icon=\"plus\" anchor=\"\" anchor_in_url=\"no\" class=\"\"]In diesem Modul k\u00f6nnen Sie jede Art von Vertr\u00e4gen mit Objekten verkn\u00fcpfen. Sie verwalten K\u00fcndigungsfristen, Laufzeiten oder Kosten und haben dank der automatischen Terminvorlage alle Fristen und Termine im Griff.[/su_spoiler]   [su_spoiler title=\" Workflow-Manager\" open=\"no\" style=\"default
